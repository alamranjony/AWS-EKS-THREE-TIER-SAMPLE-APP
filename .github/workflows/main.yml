name: Build, Test, and Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC -> AWS role assumption, no stored AWS keys
  contents: write    # required to create a GitHub release tag

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY_BACKEND: devopsassess-backend
  ECR_REPOSITORY_FRONTEND: devopsassess-frontend
  EKS_CLUSTER_NAME: devops-assessment-eks
  IMAGE_TAG: ${{ github.sha }}

jobs:

  test-and-build:
    name: Install, test, build & push images
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run backend tests
        run: cd backend && npm test

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run frontend tests
        run: cd frontend && npm test

      # OIDC federation - GitHub issues a short-lived token, AWS trusts it
      # via a pre-configured IAM OIDC identity provider + role trust
      # policy. No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY stored as a
      # repo secret at all. See main README's AWS Console prerequisites.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::896364725826:role/github-actions-role-eks
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        working-directory: backend
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}
          docker build -t $IMAGE_URI:${{ env.IMAGE_TAG }} .
          docker push $IMAGE_URI:${{ env.IMAGE_TAG }}

      - name: Build, tag, and push frontend image
        working-directory: frontend
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}
          docker build -t $IMAGE_URI:${{ env.IMAGE_TAG }} .
          docker push $IMAGE_URI:${{ env.IMAGE_TAG }}

  release:
    name: Tag release
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub release tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          generate_release_notes: true

  deploy:
    name: Deploy to EKS
    needs: [test-and-build, release]
    runs-on: ubuntu-latest
    environment: production   # requires a manual approval gate if configured under repo Settings > Environments
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Substitute ECR registry + image tag (never hardcoded as latest)
        run: |
          ECR_REGISTRY=${{ needs.test-and-build.outputs.ecr_registry }}
          sed -i "s#__ECR_REPOSITORY_URI__#$ECR_REGISTRY#g; s#__IMAGE_TAG__#${{ env.IMAGE_TAG }}#g" \
            k8s/backend-deployment.yaml k8s/frontend-deployment.yaml

      # ServiceAccount + Secrets Manager SecretProviderClass must exist
      # before the Deployments that mount them - see
      # docs/secrets-manager-integration.md for the one-time IRSA setup
      # this assumes is already in place.
      - name: Apply backend ServiceAccount (IRSA)
        run: kubectl apply -f k8s/backend-serviceaccount.yaml

      - name: Apply ConfigMap and Secrets Manager SecretProviderClass
        run: |
          kubectl apply -f k8s/backend-configmap.yaml
          kubectl apply -f k8s/backend-secret-example.yaml

      # Frontend and backend are deployed as separate Deployment + Service
      # pairs. Backend Service stays ClusterIP-only, never referenced by
      # the Ingress - internal only.
      - name: Deploy backend (Deployment + internal-only Service)
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml

      - name: Deploy frontend (Deployment + Service)
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml

      - name: Apply Ingress (exposes frontend externally via ALB)
        run: kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=180s
          kubectl rollout status deployment/frontend --timeout=180s
