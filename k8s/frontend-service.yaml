apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  # NodePort is required as the target type for the AWS Load Balancer
  # Controller's "instance" target mode used in ingress.yaml; ClusterIP
  # also works if the Ingress is annotated for "ip" target-type instead.
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
