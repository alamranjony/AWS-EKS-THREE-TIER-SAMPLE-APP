apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Required so the CSI driver can assume the IAM role (IRSA) that
      # has read access to the Secrets Manager secret. See
      # docs/secrets-manager-integration.md step 4.
      serviceAccountName: backend-sa
      containers:
        - name: backend
          # Image tag is templated by the pipeline - never hardcode "latest".
          # Example after pipeline substitution:
          # <account>.dkr.ecr.<region>.amazonaws.com/backend:1.4.0
          image: 896364725826.dkr.ecr.ap-southeast-1.amazonaws.com/devopsassess-backend/backend:__IMAGE_TAG__
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                # Does not exist until a pod mounts the CSI volume below
                # at least once - the CSI driver creates and keeps it in
                # sync with Secrets Manager via `secretObjects` in the
                # SecretProviderClass. Never committed to git, never
                # hand-created with kubectl.
                name: backend-db-secret
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: backend-db-secrets
