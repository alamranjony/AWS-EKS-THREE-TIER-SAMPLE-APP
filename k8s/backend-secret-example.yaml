# EXAMPLE / TEMPLATE - no real credentials live in this file. This
# SecretProviderClass tells the AWS provider for the Secrets Store CSI
# Driver which Secrets Manager secret to fetch and mount into the
# backend pod, and mirrors it into a native Kubernetes Secret via
# secretObjects below. See docs/secrets-manager-integration.md for the
# full one-time setup (installing the CSI driver + AWS provider, IRSA,
# creating the Secrets Manager secret).
#
# Assumes ONE Secrets Manager secret (JSON) holding all four fields,
# e.g. created with:
#   aws secretsmanager create-secret --name devops-assessment/db-credentials \
#     --secret-string '{"DB_HOST":"...","DB_NAME":"...","DB_USER":"...","DB_PASSWORD":"..."}'
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backend-db-secrets
  namespace: default
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "devops-assessment/db-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "DB_HOST"
            objectAlias: "db-host"
          - path: "DB_NAME"
            objectAlias: "db-name"
          - path: "DB_USER"
            objectAlias: "db-user"
          - path: "DB_PASSWORD"
            objectAlias: "db-password"
  # secretObjects mirrors the mounted Secrets Manager values into a
  # native Kubernetes Secret ("backend-db-secret") so the backend
  # Deployment can keep using a normal envFrom/secretRef, unchanged,
  # instead of reading files off disk. The CSI driver keeps this Secret
  # in sync with Secrets Manager on its polling interval.
  secretObjects:
    - secretName: backend-db-secret
      type: Opaque
      data:
        - objectName: db-host
          key: DB_HOST
        - objectName: db-name
          key: DB_NAME
        - objectName: db-user
          key: DB_USER
        - objectName: db-password
          key: DB_PASSWORD
