# Bound to an IAM role via IAM Roles for Service Accounts (IRSA) - the
# EKS OIDC provider lets this ServiceAccount assume the annotated role
# without any stored AWS credential. That role is granted read-only
# access to just the Secrets Manager secret this app needs (see
# docs/secrets-manager-integration.md).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::__AWS_ACCOUNT_ID__:role/__BACKEND_SECRETS_ROLE_NAME__"
